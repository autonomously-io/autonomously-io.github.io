<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <g transform="translate(60, 60)">
    <!-- Circular outline -->
    <circle cx="0" cy="0" r="50" stroke="#4a9eff" stroke-width="2" opacity="0.3" fill="none"/>

    <!-- Edges: Outer → Middle -->
    <line x1="0" y1="-42" x2="0" y2="-24" stroke="#4a9eff" stroke-width="1.5" opacity="0.4"/>
    <line x1="-36" y1="-21" x2="0" y2="-24" stroke="#4a9eff" stroke-width="1.5" opacity="0.35"/>
    <line x1="36" y1="-21" x2="0" y2="-24" stroke="#4a9eff" stroke-width="1.5" opacity="0.35"/>
    <line x1="-36" y1="21" x2="-21" y2="12" stroke="#4a9eff" stroke-width="1.5" opacity="0.4"/>
    <line x1="36" y1="21" x2="21" y2="12" stroke="#4a9eff" stroke-width="1.5" opacity="0.4"/>
    <line x1="0" y1="42" x2="-21" y2="12" stroke="#4a9eff" stroke-width="1.5" opacity="0.35"/>
    <line x1="0" y1="42" x2="21" y2="12" stroke="#4a9eff" stroke-width="1.5" opacity="0.35"/>

    <!-- Edges: Middle → Core -->
    <line x1="0" y1="-24" x2="0" y2="0" stroke="#4a9eff" stroke-width="2" opacity="0.5"/>
    <line x1="-21" y1="12" x2="0" y2="0" stroke="#4a9eff" stroke-width="2" opacity="0.5"/>
    <line x1="21" y1="12" x2="0" y2="0" stroke="#4a9eff" stroke-width="2" opacity="0.5"/>

    <!-- Outer ring nodes -->
    <circle cx="0" cy="-42" r="4.5" fill="#4a9eff" opacity="0.7"/>
    <circle cx="-36" cy="-21" r="4.5" fill="#4a9eff" opacity="0.7"/>
    <circle cx="-36" cy="21" r="4.5" fill="#4a9eff" opacity="0.7"/>
    <circle cx="0" cy="42" r="4.5" fill="#4a9eff" opacity="0.7"/>
    <circle cx="36" cy="21" r="4.5" fill="#4a9eff" opacity="0.75"/>
    <circle cx="36" cy="-21" r="4.5" fill="#4a9eff" opacity="0.75"/>

    <!-- Middle ring nodes -->
    <circle cx="0" cy="-24" r="5" fill="#4a9eff" opacity="0.85"/>
    <circle cx="-21" cy="12" r="5" fill="#4a9eff" opacity="0.85"/>
    <circle cx="21" cy="12" r="5" fill="#4a9eff" opacity="0.85"/>

    <!-- Core -->
    <circle cx="0" cy="0" r="7.5" fill="#4a9eff"/>

    <!-- Glow -->
    <circle cx="0" cy="0" r="16" fill="#4a9eff" opacity="0.08"/>
  </g>
</svg>
