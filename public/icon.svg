<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <g transform="translate(60, 60)">
    <!-- Circular outline -->
    <circle cx="0" cy="0" r="50" stroke="#4a9eff" stroke-width="2" opacity="0.3" fill="none"/>

    <!-- Edges UNDER nodes -->
    <!-- Outer → Middle -->
    <path d="M0 -42 Q0 -33 0 -24" stroke="#4a9eff" stroke-width="1.5" opacity="0.4" fill="none"/>
    <path d="M-36 -21 Q-28 -18 -21 -10" stroke="#4a9eff" stroke-width="1.5" opacity="0.35" fill="none"/>
    <path d="M36 -21 Q28 -18 21 -10" stroke="#4a9eff" stroke-width="1.5" opacity="0.35" fill="none"/>
    <path d="M-36 21 Q-28 16 -21 12" stroke="#4a9eff" stroke-width="1.5" opacity="0.4" fill="none"/>
    <path d="M36 21 Q28 16 21 12" stroke="#4a9eff" stroke-width="1.5" opacity="0.4" fill="none"/>
    <path d="M0 42 Q-10 28 -21 12" stroke="#4a9eff" stroke-width="1.5" opacity="0.35" fill="none"/>
    <path d="M0 42 Q10 28 21 12" stroke="#4a9eff" stroke-width="1.5" opacity="0.35" fill="none"/>

    <!-- Middle → Core -->
    <path d="M0 -24 Q0 -12 0 0" stroke="#4a9eff" stroke-width="2" opacity="0.5" fill="none"/>
    <path d="M-21 12 Q-10 6 0 0" stroke="#4a9eff" stroke-width="2" opacity="0.5" fill="none"/>
    <path d="M21 12 Q10 6 0 0" stroke="#4a9eff" stroke-width="2" opacity="0.5" fill="none"/>

    <!-- Outer ring nodes -->
    <circle cx="0" cy="-42" r="4.5" fill="#4a9eff" opacity="0.7"/>
    <circle cx="-36" cy="-21" r="4.5" fill="#4a9eff" opacity="0.7"/>
    <circle cx="-36" cy="21" r="4.5" fill="#4a9eff" opacity="0.7"/>
    <circle cx="0" cy="42" r="4.5" fill="#4a9eff" opacity="0.7"/>
    <circle cx="36" cy="21" r="4.5" fill="#4a9eff" opacity="0.75"/>
    <circle cx="36" cy="-21" r="4.5" fill="#4a9eff" opacity="0.75"/>

    <!-- Middle ring nodes -->
    <circle cx="0" cy="-24" r="5" fill="#4a9eff" opacity="0.85"/>
    <circle cx="-21" cy="12" r="5" fill="#4a9eff" opacity="0.85"/>
    <circle cx="21" cy="12" r="5" fill="#4a9eff" opacity="0.85"/>

    <!-- Core -->
    <circle cx="0" cy="0" r="7.5" fill="#4a9eff"/>

    <!-- Glow -->
    <circle cx="0" cy="0" r="16" fill="#4a9eff" opacity="0.08"/>
  </g>
</svg>
