<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <g transform="translate(60, 60)">
    <!-- Circular outline -->
    <circle cx="0" cy="0" r="50" stroke="#4a9eff" stroke-width="1.5" opacity="0.15" fill="none"/>

    <!-- Outer ring nodes -->
    <circle cx="0" cy="-42" r="4" fill="#4a9eff" opacity="0.5"/>
    <circle cx="-36" cy="-21" r="4" fill="#4a9eff" opacity="0.5"/>
    <circle cx="-36" cy="21" r="4" fill="#4a9eff" opacity="0.5"/>
    <circle cx="0" cy="42" r="4" fill="#4a9eff" opacity="0.5"/>
    <circle cx="36" cy="21" r="4" fill="#4a9eff" opacity="0.55"/>
    <circle cx="36" cy="-21" r="4" fill="#4a9eff" opacity="0.55"/>

    <!-- Middle ring -->
    <circle cx="0" cy="-24" r="4.5" fill="#4a9eff" opacity="0.7"/>
    <circle cx="-21" cy="12" r="4.5" fill="#4a9eff" opacity="0.7"/>
    <circle cx="21" cy="12" r="4.5" fill="#4a9eff" opacity="0.7"/>

    <!-- Core -->
    <circle cx="0" cy="0" r="7" fill="#4a9eff"/>

    <!-- Outer → Middle curves -->
    <path d="M0 -38 Q0 -32 0 -29" stroke="#4a9eff" stroke-width="1" opacity="0.2" fill="none"/>
    <path d="M-32 -20 Q-26 -18 -22 -14" stroke="#4a9eff" stroke-width="1" opacity="0.18" fill="none"/>
    <path d="M32 -20 Q22 -18 18 -12" stroke="#4a9eff" stroke-width="1" opacity="0.18" fill="none"/>
    <path d="M-32 20 Q-26 16 -22 14" stroke="#4a9eff" stroke-width="1" opacity="0.2" fill="none"/>
    <path d="M32 20 Q26 16 22 14" stroke="#4a9eff" stroke-width="1" opacity="0.2" fill="none"/>
    <path d="M0 38 Q-8 28 -19 14" stroke="#4a9eff" stroke-width="1" opacity="0.18" fill="none"/>
    <path d="M0 38 Q8 28 19 14" stroke="#4a9eff" stroke-width="1" opacity="0.18" fill="none"/>

    <!-- Middle → Core curves -->
    <path d="M0 -20 Q0 -12 0 -7" stroke="#4a9eff" stroke-width="1.5" opacity="0.3" fill="none"/>
    <path d="M-17 10 Q-10 6 -6 2" stroke="#4a9eff" stroke-width="1.5" opacity="0.3" fill="none"/>
    <path d="M17 10 Q10 6 6 2" stroke="#4a9eff" stroke-width="1.5" opacity="0.3" fill="none"/>

    <!-- Glow -->
    <circle cx="0" cy="0" r="14" fill="#4a9eff" opacity="0.06"/>
  </g>
