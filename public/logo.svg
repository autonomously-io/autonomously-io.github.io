    <circle cx="0" cy="-24" r="4" fill="#4a9eff" opacity="0.85"/>
    <circle cx="-21" cy="12" r="4" fill="#4a9eff" opacity="0.85"/>
    <circle cx="21" cy="12" r="4" fill="#4a9eff" opacity="0.85"/>

    <!-- Core -->
    <circle cx="0" cy="0" r="6" fill="#4a9eff"/>

    <!-- Glow -->
    <circle cx="0" cy="0" r="12" fill="#4a9eff" opacity="0.08"/>
    <circle cx="0" cy="0" r="20" fill="#4a9eff" opacity="0.035"/>
