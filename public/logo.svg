    <path d="M33 20 Q26 16 22 14" stroke="#4a9eff" stroke-width="0.8" opacity="0.2" fill="none"/>
    <path d="M0 39 Q-8 28 -19 14" stroke="#4a9eff" stroke-width="0.8" opacity="0.18" fill="none"/>
    <path d="M0 39 Q8 28 19 14" stroke="#4a9eff" stroke-width="0.8" opacity="0.18" fill="none"/>
    <path d="M-33 -20 Q-14 -6 -19 10" stroke="#4a9eff" stroke-width="0.7" opacity="0.1" fill="none"/>
