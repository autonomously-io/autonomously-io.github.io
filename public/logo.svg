    <!-- Edges drawn UNDER nodes -->
    <!-- Outer → Middle -->
    <path d="M0 -42 Q0 -33 0 -24" stroke="#4a9eff" stroke-width="1.2" opacity="0.4" fill="none"/>
    <path d="M-36 -21 Q-28 -18 -21 -10" stroke="#4a9eff" stroke-width="1.2" opacity="0.35" fill="none"/>
    <path d="M36 -21 Q28 -18 21 -10" stroke="#4a9eff" stroke-width="1.2" opacity="0.35" fill="none"/>
    <path d="M-36 21 Q-28 16 -21 12" stroke="#4a9eff" stroke-width="1.2" opacity="0.4" fill="none"/>
    <path d="M36 21 Q28 16 21 12" stroke="#4a9eff" stroke-width="1.2" opacity="0.4" fill="none"/>
    <path d="M0 42 Q-10 28 -21 12" stroke="#4a9eff" stroke-width="1.2" opacity="0.35" fill="none"/>
    <path d="M0 42 Q10 28 21 12" stroke="#4a9eff" stroke-width="1.2" opacity="0.35" fill="none"/>
    <path d="M-36 -21 Q-22 -4 -21 12" stroke="#4a9eff" stroke-width="1" opacity="0.2" fill="none"/>
    <path d="M36 -21 Q22 -4 21 12" stroke="#4a9eff" stroke-width="1" opacity="0.2" fill="none"/>
    <path d="M0 -42 Q-14 -18 -21 12" stroke="#4a9eff" stroke-width="1" opacity="0.15" fill="none"/>
    <path d="M0 -42 Q14 -18 21 12" stroke="#4a9eff" stroke-width="1" opacity="0.15" fill="none"/>

    <!-- Middle → Core -->
    <path d="M0 -24 Q0 -12 0 0" stroke="#4a9eff" stroke-width="1.8" opacity="0.5" fill="none"/>
    <path d="M-21 12 Q-10 6 0 0" stroke="#4a9eff" stroke-width="1.8" opacity="0.5" fill="none"/>
    <path d="M21 12 Q10 6 0 0" stroke="#4a9eff" stroke-width="1.8" opacity="0.5" fill="none"/>

    <!-- Outer ring nodes -->
    <circle cx="0" cy="-42" r="3.5" fill="#4a9eff" opacity="0.7"/>
    <circle cx="-36" cy="-21" r="3.5" fill="#4a9eff" opacity="0.7"/>
    <circle cx="-36" cy="21" r="3.5" fill="#4a9eff" opacity="0.7"/>
    <circle cx="0" cy="42" r="3.5" fill="#4a9eff" opacity="0.7"/>
