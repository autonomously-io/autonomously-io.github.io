<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none">
  <!-- Neural network / brain-like mesh -->
  <g>
    <!-- Layer 1: Input nodes (multi-source signals) -->
    <circle cx="20" cy="30" r="3.5" fill="#4a9eff" opacity="0.6"/>
    <circle cx="20" cy="60" r="3.5" fill="#4a9eff" opacity="0.6"/>
    <circle cx="20" cy="90" r="3.5" fill="#4a9eff" opacity="0.6"/>

    <!-- Layer 2: Hidden nodes -->
    <circle cx="52" cy="38" r="4" fill="#4a9eff" opacity="0.75"/>
    <circle cx="52" cy="68" r="4" fill="#4a9eff" opacity="0.75"/>
    <circle cx="52" cy="90" r="3" fill="#4a9eff" opacity="0.5"/>

    <!-- Layer 3: Deep correlation -->
    <circle cx="82" cy="45" r="4.5" fill="#4a9eff" opacity="0.85"/>
    <circle cx="82" cy="75" r="4.5" fill="#4a9eff" opacity="0.85"/>

    <!-- Layer 4: Core understanding -->
    <circle cx="110" cy="60" r="6" fill="#4a9eff"/>

    <!-- Edges: Layer 1 → 2 -->
    <line x1="23" y1="30" x2="48" y2="38" stroke="#4a9eff" stroke-width="0.8" opacity="0.2"/>
    <line x1="23" y1="30" x2="48" y2="68" stroke="#4a9eff" stroke-width="0.8" opacity="0.12"/>
    <line x1="23" y1="60" x2="48" y2="38" stroke="#4a9eff" stroke-width="0.8" opacity="0.15"/>
    <line x1="23" y1="60" x2="48" y2="68" stroke="#4a9eff" stroke-width="0.8" opacity="0.2"/>
    <line x1="23" y1="60" x2="48" y2="90" stroke="#4a9eff" stroke-width="0.8" opacity="0.12"/>
    <line x1="23" y1="90" x2="48" y2="68" stroke="#4a9eff" stroke-width="0.8" opacity="0.15"/>
    <line x1="23" y1="90" x2="48" y2="90" stroke="#4a9eff" stroke-width="0.8" opacity="0.2"/>

    <!-- Edges: Layer 2 → 3 -->
    <line x1="56" y1="38" x2="78" y2="45" stroke="#4a9eff" stroke-width="1" opacity="0.25"/>
    <line x1="56" y1="38" x2="78" y2="75" stroke="#4a9eff" stroke-width="1" opacity="0.15"/>
    <line x1="56" y1="68" x2="78" y2="45" stroke="#4a9eff" stroke-width="1" opacity="0.15"/>
    <line x1="56" y1="68" x2="78" y2="75" stroke="#4a9eff" stroke-width="1" opacity="0.25"/>
    <line x1="55" y1="90" x2="78" y2="75" stroke="#4a9eff" stroke-width="1" opacity="0.15"/>

    <!-- Edges: Layer 3 → 4 -->
    <line x1="86" y1="45" x2="104" y2="58" stroke="#4a9eff" stroke-width="1.2" opacity="0.35"/>
    <line x1="86" y1="75" x2="104" y2="62" stroke="#4a9eff" stroke-width="1.2" opacity="0.35"/>

    <!-- Pulse glow on core -->
    <circle cx="110" cy="60" r="12" fill="#4a9eff" opacity="0.08"/>
    <circle cx="110" cy="60" r="18" fill="#4a9eff" opacity="0.03"/>
  </g>

  <!-- Text: a10y -->
  <text x="145" y="76" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="56" font-weight="300" letter-spacing="0.04em" fill="#ffffff">
    <tspan>a</tspan><tspan fill="#4a9eff">10</tspan><tspan>y</tspan>
  </text>
</svg>
