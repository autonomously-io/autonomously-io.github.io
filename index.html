<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>a10y - Autonomously</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 720px;
            padding: 2rem;
            text-align: center;
        }
        h1 {
            font-size: 4rem;
            font-weight: 300;
            letter-spacing: 0.2em;
            margin-bottom: 0.5rem;
            color: #fff;
        }
        .expand {
            font-size: 1.1rem;
            color: #888;
            letter-spacing: 0.15em;
            margin-bottom: 2rem;
        }
        .tagline {
            font-size: 1.3rem;
            line-height: 1.8;
            color: #aaa;
            margin-bottom: 3rem;
        }
        .links a {
            color: #4a9eff;
            text-decoration: none;
            margin: 0 1rem;
            font-size: 0.95rem;
        }
        .links a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h1>a10y</h1>
        <p class="expand">Autonomously</p>
        <p class="tagline">Penetrate. Understand. Restore.<br>Autonomously understands and restores your network.</p>
        <div class="links">
            <a href="https://github.com/autonomously-io">GitHub</a>
        </div>
    </div>
</body>
</html>
